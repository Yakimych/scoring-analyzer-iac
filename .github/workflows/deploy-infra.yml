name: Infrastructure
on:
  push:
  workflow_dispatch:

env:
  CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_ORG_ID: ${{ secrets.SUPABASE_ORG_ID }}
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
  VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
  GRAFANA_CLOUD_ACCESS_POLICY_TOKEN: ${{ secrets.GRAFANA_CLOUD_ACCESS_POLICY_TOKEN }}
  SCORING_ANALYZER_ALERT_DISPATCH_TOKEN: ${{ secrets.SCORING_ANALYZER_ALERT_DISPATCH_TOKEN }}

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.diff.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npx sst install
      - name: SST Diff
        id: diff
        run: |
          set +e
          OUTPUT=$(npx sst diff --stage prod 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::SST diff failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
          if echo "$OUTPUT" | grep -qE '^[+*-]  '; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Changes detected — deployment will require approval."
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No changes to be made, deployment step will be skipped."
          fi

  deploy:
    needs: plan
    if: github.ref == 'refs/heads/main' && needs.plan.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npx sst install
      - run: npx sst deploy --stage prod
