name: Restart Supabase Project

on:
  repository_dispatch:
    types: [supabase_restart_requested]
  workflow_dispatch:
    inputs:
      reason:
        description: Why the Supabase project should be restarted
        required: false
        default: manual
      restart_only_if_unhealthy:
        description: Skip restart when Supabase reports ACTIVE_HEALTHY
        required: false
        type: boolean
        default: false

permissions:
  actions: write
  contents: read

concurrency:
  group: supabase-restart
  cancel-in-progress: false

env:
  COOLDOWN_SECONDS: "600"
  MARKER_ARTIFACT_NAME: supabase-restart-marker-rlyhhlwyzeqhoxlralre
  RESTART_TIMEOUT_SECONDS: "900"
  SUPABASE_PROJECT_REF: rlyhhlwyzeqhoxlralre

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve request
        id: request
        env:
          DISPATCH_PROJECT_REF: ${{ github.event.client_payload.project_ref }}
          DISPATCH_REASON: ${{ github.event.client_payload.reason }}
          DISPATCH_ALERTNAME: ${{ github.event.client_payload.alertname }}
          DISPATCH_STATUS: ${{ github.event.client_payload.status }}
          DISPATCH_RESTART_ONLY_IF_UNHEALTHY: ${{ github.event.client_payload.restart_only_if_unhealthy }}
          MANUAL_REASON: ${{ github.event_name == 'workflow_dispatch' && inputs.reason || '' }}
          MANUAL_RESTART_ONLY_IF_UNHEALTHY: ${{ github.event_name == 'workflow_dispatch' && inputs.restart_only_if_unhealthy || false }}
        run: |
          set -euo pipefail

          project_ref="${DISPATCH_PROJECT_REF:-$SUPABASE_PROJECT_REF}"
          if [ "$project_ref" != "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::Refusing to restart unexpected Supabase project '$project_ref'."
            exit 1
          fi

          reason="${DISPATCH_REASON:-${MANUAL_REASON:-grafana-alert}}"
          alertname="${DISPATCH_ALERTNAME:-manual}"
          status="${DISPATCH_STATUS:-firing}"
          restart_only_if_unhealthy="${DISPATCH_RESTART_ONLY_IF_UNHEALTHY:-${MANUAL_RESTART_ONLY_IF_UNHEALTHY:-false}}"

          case "$restart_only_if_unhealthy" in
            true | True | TRUE | 1 | yes | Yes | YES)
              restart_only_if_unhealthy=true
              ;;
            false | False | FALSE | 0 | no | No | NO | "")
              restart_only_if_unhealthy=false
              ;;
            *)
              echo "::error::restart_only_if_unhealthy must be true or false, got '$restart_only_if_unhealthy'."
              exit 1
              ;;
          esac

          if [ "$GITHUB_EVENT_NAME" = "repository_dispatch" ] && [ "$status" != "firing" ]; then
            echo "::notice::Ignoring non-firing Grafana notification with status '$status'."
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "allowed=true"
            echo "project_ref=$project_ref"
            echo "reason=$reason"
            echo "alertname=$alertname"
            echo "restart_only_if_unhealthy=$restart_only_if_unhealthy"
          } >> "$GITHUB_OUTPUT"

      - name: Check restart cooldown
        id: cooldown
        if: steps.request.outputs.allowed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          now_epoch="$(date -u +%s)"
          artifacts_json="$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${GITHUB_REPOSITORY}/actions/artifacts?name=${MARKER_ARTIFACT_NAME}&per_page=20"
          )"

          latest_created_at="$(
            echo "$artifacts_json" |
              jq -r '.artifacts | map(select(.expired == false)) | sort_by(.created_at) | reverse | .[0].created_at // ""'
          )"

          if [ -n "$latest_created_at" ]; then
            latest_epoch="$(date -u -d "$latest_created_at" +%s)"
            age_seconds="$((now_epoch - latest_epoch))"

            if [ "$age_seconds" -lt "$COOLDOWN_SECONDS" ]; then
              wait_seconds="$((COOLDOWN_SECONDS - age_seconds))"
              echo "::notice::Skipping Supabase restart. Last restart marker was created ${age_seconds}s ago; ${wait_seconds}s remain in the cooldown."
              {
                echo "allowed=false"
                echo "wait_seconds=$wait_seconds"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "allowed=true" >> "$GITHUB_OUTPUT"

      - name: Check Supabase project health guard
        id: health
        if: steps.cooldown.outputs.allowed == 'true'
        env:
          PROJECT_REF: ${{ steps.request.outputs.project_ref }}
          RESTART_ONLY_IF_UNHEALTHY: ${{ steps.request.outputs.restart_only_if_unhealthy }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is required."
            exit 1
          fi

          response_file="$(mktemp)"
          http_status="$(
            curl -sS -o "$response_file" -w "%{http_code}" \
              -X GET "https://api.supabase.com/v1/projects/${PROJECT_REF}" \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              -H "Content-Type: application/json"
          )"

          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            echo "::error::Supabase API GET /v1/projects/${PROJECT_REF} failed with HTTP ${http_status}."
            cat "$response_file"
            exit 1
          fi

          current_status="$(jq -r '.status // "UNKNOWN"' "$response_file")"
          echo "Current Supabase project status: ${current_status}"
          echo "current_status=$current_status" >> "$GITHUB_OUTPUT"

          if [ "$RESTART_ONLY_IF_UNHEALTHY" = "true" ] && [ "$current_status" = "ACTIVE_HEALTHY" ]; then
            echo "::notice::Skipping Supabase restart because restart_only_if_unhealthy=true and project status is ACTIVE_HEALTHY."
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "allowed=true" >> "$GITHUB_OUTPUT"

      - name: Write restart marker
        if: steps.health.outputs.allowed == 'true'
        env:
          ALERTNAME: ${{ steps.request.outputs.alertname }}
          PROJECT_REF: ${{ steps.request.outputs.project_ref }}
          REASON: ${{ steps.request.outputs.reason }}
          RESTART_ONLY_IF_UNHEALTHY: ${{ steps.request.outputs.restart_only_if_unhealthy }}
        run: |
          set -euo pipefail

          cat > supabase-restart-marker.json <<EOF
          {
            "requested_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "project_ref": "$PROJECT_REF",
            "reason": "$REASON",
            "alertname": "$ALERTNAME",
            "restart_only_if_unhealthy": "$RESTART_ONLY_IF_UNHEALTHY",
            "run_id": "$GITHUB_RUN_ID",
            "run_attempt": "$GITHUB_RUN_ATTEMPT"
          }
          EOF

      - name: Save restart marker
        if: steps.health.outputs.allowed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.MARKER_ARTIFACT_NAME }}
          path: supabase-restart-marker.json
          retention-days: 7

      - name: Restart Supabase project
        if: steps.health.outputs.allowed == 'true'
        env:
          INITIAL_STATUS: ${{ steps.health.outputs.current_status }}
          PROJECT_REF: ${{ steps.request.outputs.project_ref }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is required."
            exit 1
          fi

          supabase_api() {
            local method="$1"
            local path="$2"
            local data="${3:-}"
            local response_file
            local http_status

            response_file="$(mktemp)"
            if [ -n "$data" ]; then
              http_status="$(
                curl -sS -o "$response_file" -w "%{http_code}" \
                  -X "$method" "https://api.supabase.com${path}" \
                  -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
                  -H "Content-Type: application/json" \
                  --data "$data"
              )"
            else
              http_status="$(
                curl -sS -o "$response_file" -w "%{http_code}" \
                  -X "$method" "https://api.supabase.com${path}" \
                  -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
                  -H "Content-Type: application/json"
              )"
            fi

            if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
              echo "::error::Supabase API ${method} ${path} failed with HTTP ${http_status}."
              cat "$response_file"
              exit 1
            fi

            cat "$response_file"
          }

          project_status() {
            supabase_api GET "/v1/projects/${PROJECT_REF}" | jq -r '.status // "UNKNOWN"'
          }

          wait_for_restart() {
            local timeout_seconds="$1"
            local elapsed_seconds=0
            local status

            while [ "$elapsed_seconds" -le "$timeout_seconds" ]; do
              status="$(project_status)"
              echo "Supabase project status while waiting for restart completion: ${status}"

              if [[ "$status" =~ ^ACTIVE ]]; then
                return 0
              fi

              sleep 15
              elapsed_seconds="$((elapsed_seconds + 15))"
            done

            echo "::error::Timed out waiting for Supabase project restart to complete."
            exit 1
          }

          current_status="${INITIAL_STATUS:-$(project_status)}"
          echo "Initial Supabase project status: ${current_status}"

          echo "Restarting Supabase project ${PROJECT_REF}."
          supabase_api POST "/platform/projects/${PROJECT_REF}/restart" '{}' > /dev/null
          wait_for_restart "$RESTART_TIMEOUT_SECONDS"

          echo "Supabase project restart completed."

      - name: Summarize
        if: always()
        env:
          COOLDOWN_ALLOWED: ${{ steps.cooldown.outputs.allowed }}
          HEALTH_ALLOWED: ${{ steps.health.outputs.allowed }}
          INITIAL_STATUS: ${{ steps.health.outputs.current_status }}
          REQUEST_ALLOWED: ${{ steps.request.outputs.allowed }}
          PROJECT_REF: ${{ steps.request.outputs.project_ref }}
          RESTART_ONLY_IF_UNHEALTHY: ${{ steps.request.outputs.restart_only_if_unhealthy }}
        run: |
          {
            echo "## Supabase restart"
            echo
            echo "- Project ref: ${PROJECT_REF:-$SUPABASE_PROJECT_REF}"
            echo "- Request accepted: ${REQUEST_ALLOWED:-false}"
            echo "- Cooldown allowed restart: ${COOLDOWN_ALLOWED:-false}"
            echo "- Health guard allowed restart: ${HEALTH_ALLOWED:-false}"
            echo "- Initial status: ${INITIAL_STATUS:-unknown}"
            echo "- Restart only if unhealthy: ${RESTART_ONLY_IF_UNHEALTHY:-false}"
            echo "- Cooldown: ${COOLDOWN_SECONDS}s"
          } >> "$GITHUB_STEP_SUMMARY"
